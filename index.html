<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>卒業研究要旨作成ツール（画像任意挿入版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{font-family:"Yu Gothic","Meiryo",sans-serif;margin:0;background:#f4f6f9}
.container{display:flex;gap:20px;padding:20px}
.left{width:400px;background:#fff;padding:20px;border-radius:10px}
.right{flex:1}
input,textarea,select{width:100%;box-sizing:border-box;margin:4px 0 10px;padding:8px}
textarea{min-height:80px}
button{padding:8px 14px;margin:4px}
#summaryPage{
  width:794px;
  height:1123px;
  background:#fff;
  padding:30px;
  box-sizing:border-box;
  margin:0 auto;
  overflow:hidden;
  position:relative;
  line-height: 1.4;
}
#studentInfo{text-align:right;font-size:11px}
.columns{
  display:flex;
  gap:30px;
  height:950px;
  align-items:flex-start;
}
.column{flex:1;height:950px;overflow:hidden;}
.section{margin-bottom:8px}
.section h3{
  margin: 6px 0 3px 0;
  font-size: 16px;
}
.section figure {
  margin: 4px 0;
  padding: 0;
  display: block;
}
/* 画像の最大幅は枠に収めつつ、JavaScriptから個別にサイズ指定できるように変更 */
.section img{max-width:100%;display:block;margin:0 auto}
figcaption{text-align:center;font-size:11px;margin-top:2px}
.imageCard{border:1px solid #ccc;padding:6px;margin-bottom:6px}
.small{font-size:12px;color:#555}

#errorOverlay {
  display: none;
  background: #ffdddd;
  color: #cc0000;
  border: 2px solid #cc0000;
  padding: 10px;
  margin-bottom: 15px;
  font-weight: bold;
  border-radius: 5px;
  font-size: 14px;
}
/* スライダー用の簡易スタイル */
.range-container {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 4px 0 10px;
}
.range-container input {
  margin: 0;
}
/* 保存・読込エリア用のスタイル */
.save-load-box {
  background: #f0f4f8;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 15px;
  border: 1px dashed #abc;
}
</style>
</head>
<body>
<div class="container">

<div class="left">
<h2>入力</h2>

<div id="errorOverlay">【警告】文字数（または画像）が多すぎるため、これ以上は表示領域に入り切りません！文章を削ってください。</div>

<div class="save-load-box">
  <div class="small" style="font-weight: bold; margin-bottom: 4px;">データの保存と再開</div>
  <button onclick="saveDataToDevice()">データを保存</button>
  <button onclick="document.getElementById('fileLoader').click()">データを読込</button>
  <input type="file" id="fileLoader" accept=".json" style="display:none" onchange="loadDataFromDevice(event)">
</div>

<input id="grade" placeholder="学年" oninput="renderPaper()">
<input id="className" placeholder="組" oninput="renderPaper()">
<input id="number" placeholder="番号" oninput="renderPaper()">
<input id="studentName" placeholder="氏名" oninput="renderPaper()">
<input id="title" placeholder="研究タイトル" oninput="renderPaper()">

<h3>画像追加</h3>
<div class="small">
本文中に [[IMAGE1]] や [[IMAGE2]] と入力すると、その位置に画像が表示されます。
</div>

<input type="file" id="imageUpload" accept="image/*">
<input id="imageCaption" placeholder="図の説明">
<div class="small">画像の幅（大きさ）: <span id="sizeVal">100</span>%</div>
<div class="range-container">
  <input type="range" id="imageSize" min="20" max="100" value="100" step="5" oninput="sizeVal.textContent=this.value">
</div>
<button onclick="addImage()">画像追加</button>

<div id="imageList"></div>

<textarea id="background" placeholder="研究の背景（[[IMAGE1]] など使用可）" oninput="renderPaper()"></textarea>
<textarea id="purpose" placeholder="研究の目的" oninput="renderPaper()"></textarea>
<textarea id="method" placeholder="研究の方法" oninput="renderPaper()"></textarea>
<textarea id="result" placeholder="研究の結果" oninput="renderPaper()"></textarea>
<textarea id="discussion" placeholder="考察" oninput="renderPaper()"></textarea>
<textarea id="reference" placeholder="参考文献" oninput="renderPaper()"></textarea>

<button onclick="downloadPDF()">PDFダウンロード</button>
</div>

<div class="right">
<div id="summaryPage">
<div id="studentInfo"></div>
<div class="paper-header"><h2 id="pTitle">研究タイトル</h2></div>

<div class="columns">
<div id="leftColumn" class="column"></div>
<div id="rightColumn" class="column"></div>
</div>
</div>
</div>

</div>

<script>
let tempImage="";
let imageCounter=0;
let images=[];

imageUpload.addEventListener("change",e=>{
 const file=e.target.files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=ev=>tempImage=ev.target.result;
 reader.readAsDataURL(file);
});

function esc(s){
 return (s||"")
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/\\n/g,"<br>");
}

function addImage(){
 if(!tempImage) return;

 imageCounter++;
 const token="IMAGE"+imageCounter;

 images.push({
   token:token,
   src:tempImage,
   caption:imageCaption.value || "",
   size:imageSize.value
 });

 alert("[[" + token + "]] を本文の好きな場所に入力してください。");

 imageCaption.value="";
 imageUpload.value="";
 imageSize.value="100";
 sizeVal.textContent="100";
 tempImage="";

 renderImageList();
 renderPaper();
}

function deleteImage(index){
 images.splice(index,1);
 renderImageList();
 renderPaper();
}

function renderImageList(){
 imageList.innerHTML=images.map((img,i)=>`
   <div class="imageCard">
     <strong>[[${img.token}]]</strong> (サイズ: ${img.size}%)<br>
     ${img.caption}<br>
     <button onclick="deleteImage(${i})">削除</button>
   </div>
 `).join("");
}

function replaceImages(text){
 let html=esc(text);

 images.forEach((img,i)=>{
   const figure=`<figure><img src="${img.src}" style="width:${img.size}%;"><figcaption>図${i+1} ${img.caption}</figcaption></figure>`;
   html=html.replaceAll("[["+img.token+"]]", figure);
 });

 return html;
}

function makeSection(title,text){
 const div=document.createElement("div");
 div.className="section";
 div.innerHTML=`<h3>${title}</h3><div>${replaceImages(text)}</div>`;
 return div;
}

function renderPaper(){

 studentInfo.textContent=`学年:${grade.value} 組:${className.value} 番号:${number.value} 氏名:${studentName.value}`;
 pTitle.textContent=title.value||"研究タイトル";

 leftColumn.innerHTML="";
 rightColumn.innerHTML="";
 
 errorOverlay.style.display = "none";
 let isOverflowed = false;

 const sections=[
  ["1.研究の背景",background.value],
  ["2.研究の目的",purpose.value],
  ["3.研究の方法",method.value],
  ["4.研究の結果",result.value],
  ["5.考察",discussion.value],
  ["6.参考文献",reference.value]
 ];

 let currentColumn = leftColumn;

 sections.forEach(sec => {
   if (!sec[1].trim()) return;

   let activeBlock = document.createElement("div");
   activeBlock.className = "section";
   activeBlock.innerHTML = `<h3>${sec[0]}</h3><div class="sec-body"></div>`;
   currentColumn.appendChild(activeBlock);
   let bodyDiv = activeBlock.querySelector(".sec-body");

   const htmlContent = replaceImages(sec[1]);
   const tokens = htmlContent.match(/(<figure>[^]*?<\/figure>|<br>|&lt;|&gt;|&amp;|[\s\S])/g) || [];

   tokens.forEach(token => {
     bodyDiv.innerHTML += token;

     if (currentColumn === leftColumn && leftColumn.scrollHeight > 950) {
       const currentHTML = bodyDiv.innerHTML;
       if (token.startsWith("<figure>")) {
         bodyDiv.innerHTML = currentHTML.substring(0, currentHTML.lastIndexOf("<figure>"));
       } else if (token === "<br>") {
         bodyDiv.innerHTML = currentHTML.substring(0, currentHTML.lastIndexOf("<br>"));
       } else {
         bodyDiv.innerHTML = currentHTML.slice(0, -token.length);
       }

       currentColumn = rightColumn;
       
       activeBlock = document.createElement("div");
       activeBlock.className = "section";
       activeBlock.innerHTML = `<div class="sec-body"></div>`;
       currentColumn.appendChild(activeBlock);
       bodyDiv = activeBlock.querySelector(".sec-body");

       bodyDiv.innerHTML += token;
     }
     
     if (currentColumn === rightColumn && rightColumn.scrollHeight > 950) {
       isOverflowed = true;
     }
   });
 });

 if (isOverflowed) {
   errorOverlay.style.display = "block";
 }
}

function downloadPDF(){

 const page=document.getElementById("summaryPage");

 html2pdf().set({
   margin:0,
   filename:"卒業研究要旨.pdf",
   image:{
     type:"jpeg",
     quality:1
   },
   html2canvas:{
     scale:2,
     useCORS:true,
     scrollY:0
   },
   jsPDF:{
     unit:"px",
     format:[794,1123],
     orientation:"portrait"
   }
 }).from(page).save();
}

/* --- 追加：デバイスへの保存機能 --- */
function saveDataToDevice(){
 const data = {
   grade: grade.value,
   className: className.value,
   number: number.value,
   studentName: studentName.value,
   title: title.value,
   background: background.value,
   purpose: purpose.value,
   method: method.value,
   result: result.value,
   discussion: discussion.value,
   reference: reference.value,
   images: images,
   imageCounter: imageCounter
 };
 
 const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
 const a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = (title.value || "卒業研究要旨データ") + ".json";
 a.click();
 URL.revokeObjectURL(a.href);
}

/* --- 追加：デバイスからの読込機能 --- */
function loadDataFromDevice(event){
 const file = event.target.files[0];
 if(!file) return;
 
 const reader = new FileReader();
 reader.onload = e => {
   try {
     const data = JSON.parse(e.target.result);
     
     grade.value = data.grade || "";
     className.value = data.className || "";
     number.value = data.number || "";
     studentName.value = data.studentName || "";
     title.value = data.title || "";
     background.value = data.background || "";
     purpose.value = data.purpose || "";
     method.value = data.method || "";
     result.value = data.result || "";
     discussion.value = data.discussion || "";
     reference.value = data.reference || "";
     images = data.images || [];
     imageCounter = data.imageCounter || 0;
     
     renderImageList();
     renderPaper();
     alert("データを正常に読み込みました！");
   } catch(err) {
     alert("ファイルの読み込みに失敗しました。正しいデータファイルを選択してください。");
   }
 };
 reader.readAsText(file);
 event.target.value = ""; // 同じファイルを連続で選択できるようにリセット
}

renderPaper();
</script>
</body>
</html>
